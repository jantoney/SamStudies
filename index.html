<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#11233d">
  <title>SamStudies</title>
  <meta
    name="description"
    content="Interactive pathology study notes, flash cards, and revision questions powered by the generated study content index."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <div class="site-shell">
    <header class="hero" id="site-hero">
      <div class="hero__inner">
        <h1>SamStudies</h1>
        <div class="hero__controls">
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to dark mode"></button>
          <select class="chapter-select" id="chapter-select" aria-label="Choose a chapter">
            <option value="">Loading…</option>
          </select>
        </div>
      </div>
    </header>

    <div class="immersive-bar" id="immersive-bar">
      <button class="immersive-back" id="immersive-back" type="button">← Back</button>
      <div class="immersive-title" id="immersive-title" aria-live="polite"></div>
      <button class="immersive-action" id="immersive-action" type="button" hidden></button>
    </div>

    <div class="workspace">
      <main class="main-content">
        <section class="panel chapter-summary" id="chapter-summary" aria-live="polite"></section>

        <nav class="mode-nav panel" id="mode-nav" aria-label="Study mode selection"></nav>

        <section class="panel view-panel" id="view-root" aria-live="polite">
          <div class="empty-state">
            <h2>Loading study content</h2>
            <p>The app is reading the generated content index.</p>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer"></footer>
  </div>
</body>
</html>
