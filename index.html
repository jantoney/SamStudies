<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#11233d">
  <title>SamStudies</title>
  <meta
    name="description"
    content="Interactive pathology study notes, flash cards, and revision questions powered by the generated study content index."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <div class="hero__inner">
        <h1>SamStudies</h1>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="Chapter navigation">
        <div class="panel panel--sidebar">
          <div class="panel__header">
            <p class="panel__eyebrow">Chapters</p>
            <h2>Choose a chapter</h2>
          </div>
          <div class="chapter-list" id="chapter-list"></div>
        </div>
      </aside>

      <main class="main-content">
        <section class="panel chapter-summary" id="chapter-summary" aria-live="polite"></section>

        <nav class="mode-nav panel" id="mode-nav" aria-label="Study mode selection"></nav>

        <section class="panel view-panel" id="view-root" aria-live="polite">
          <div class="empty-state">
            <h2>Loading study content</h2>
            <p>The app is reading the generated content index.</p>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <p id="disclaimer-summary"></p>
    </footer>
  </div>
</body>
</html>
